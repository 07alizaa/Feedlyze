name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================
  # CI: Backend
  # =========================
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./feedlyze-backend

      - name: Run backend lint
        run: npm run lint || true
        working-directory: ./feedlyze-backend

  # =========================
  # CI: Frontend
  # =========================
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./feedlyze-frontend

      - name: Run frontend lint
        run: npm run lint || true
        working-directory: ./feedlyze-frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./feedlyze-frontend

  # =========================
  # CD: Deploy to EC2
  # =========================
  deploy:
    needs:
      - build-backend
      - build-frontend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy application on EC2
        run: |
          ssh -i ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker image prune -f
          EOF

