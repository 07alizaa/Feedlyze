services:
  db:
    image: postgres:15
    container_name: feedlyze_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "password@1111"
      POSTGRES_DB: feedlyze_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./feedlyze-backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./feedlyze-backend
    container_name: feedlyze_backend
    environment:
      - NODE_ENV=production
    env_file:
      - ./feedlyze-backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./feedlyze-frontend
      args:
         VITE_API_BASE_URL: "http://13.60.16.54:5000/api"
         # For local development, comment above and uncomment below:
         # VITE_API_BASE_URL: "http://localhost:5000/api"
    container_name: feedlyze_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
